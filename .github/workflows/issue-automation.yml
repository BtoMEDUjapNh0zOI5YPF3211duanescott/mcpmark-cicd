name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Manage required labels and triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body?.toLowerCase() || '';
            
            // Define all required labels
            const requiredLabels = [
              // Category labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              // Priority labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              // Status labels
              { name: 'needs-triage', color: 'ffff00', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '006b75', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '1d76db', description: 'Issue created by first-time contributor' }
            ];
            
            // Create labels if they don't exist
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name
                });
              } catch (err) {
                // Label doesn't exist, create it
                await github.rest.issues.createLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              }
            }
            
            // Collect labels to add
            let labelsToAdd = [];
            
            // Add needs-triage if not already present
            const currentLabels = context.payload.issue.labels.map(l => l.name);
            if (!currentLabels.includes('needs-triage')) {
              labelsToAdd.push('needs-triage');
            }
            
            // Assign category labels
            if (title.includes('bug') && !currentLabels.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic') && !currentLabels.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance') && !currentLabels.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }
            
            // Assign priority labels (highest priority first)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];
            
            let priorityAssigned = false;
            // Check if any priority label already exists
            const hasExistingPriority = priorityKeywords.some(p => currentLabels.includes(p.label));
            
            if (!hasExistingPriority) {
              for (const p of priorityKeywords) {
                const hasKeyword = p.keywords.some(k => title.includes(k) || body.includes(k));
                if (hasKeyword) {
                  labelsToAdd.push(p.label);
                  priorityAssigned = true;
                  break;
                }
              }
              
              // Default to priority-medium if no priority found
              if (!priorityAssigned) {
                labelsToAdd.push('priority-medium');
              }
            }
            
            // Add labels to issue if there are any to add
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    permissions:
      issues: write
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const originalTitle = context.payload.issue.title;
            const subtasks = [
              { name: "Requirements Analysis" },
              { name: "Design and Architecture" },
              { name: "Implementation" },
              { name: "Testing and Documentation" }
            ];
            
            const subtaskNumbers = [];
            
            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${i+1}: ${subtasks[i].name}`;
              const subtaskBody = `Related to #${issue.number}`;
              
              const subtask = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subtaskNumbers.push(subtask.data.number);
            }
            
            // Update parent issue with checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const newBody = `${context.payload.issue.body || ''}\n\n## Epic Tasks\n${checklist}`;
            
            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: always() # Run even if task-breakdown is skipped
    permissions:
      issues: write
      repository-projects: write
    steps:
      - name: Check if first time contributor
        uses: actions/github-script@v7
        id: first-contributor
        with:
          script: |
            const issue = context.issue;
            const author = context.payload.issue.user.login;
            
            // Get all issues by this author in the repo
            const issues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              creator: author,
              state: 'all'
            });
            
            // Check if this is their first issue
            const isFirst = issues.data.length === 1;
            return isFirst;
      
      - name: Add first-time-contributor label if needed
        uses: actions/github-script@v7
        if: steps.first-contributor.outputs.result == 'true'
        with:
          script: |
            const issue = context.issue;
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['first-time-contributor']
            });
      
      - name: Post appropriate response
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const labels = context.payload.issue.labels.map(l => l.name);
            
            let response = '';
            
            // Welcome message for first time contributors
            if (${{ steps.first-contributor.outputs.result }}) {
              response += "👋 Welcome! This is your first issue in this repository. We appreciate your contribution!\n\n";
            }
            
            // Add type-specific guidelines
            if (labels.includes('bug')) {
              response += "### Bug Report Guidelines\nPlease ensure you've provided all necessary details to help us reproduce and fix this bug, including steps to reproduce, expected behavior, and environment details.\n";
            } else if (labels.includes('epic')) {
              response += "### Feature Request Process\nThis epic will be broken down into subtasks shortly. We'll review the requirements and provide updates as we progress.\n";
            } else if (labels.includes('maintenance')) {
              response += "### Maintenance Guidelines\nPlease provide any additional context about the maintenance work needed, including expected outcomes and any dependencies.\n";
            }
            
            // Post comment
            await github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: response
            });
      
      - name: Set milestone for high/critical priority
        uses: actions/github-script@v7
        if: contains(github.event.issue.labels.*.name, 'priority-high') || contains(github.event.issue.labels.*.name, 'priority-critical')
        with:
          script: |
            const issue = context.issue;
            
            // Get or create v1.0.0 milestone
            let milestone = await github.rest.milestones.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              state: 'open',
              title: 'v1.0.0'
            });
            
            if (milestone.data.length === 0) {
              milestone = await github.rest.milestones.create({
                owner: issue.owner,
                repo: issue.repo,
                title: 'v1.0.0',
                description: 'Initial release milestone'
              });
            }
            
            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              milestone: milestone.data[0]?.number || milestone.data.number
            });
      
      - name: Update status to needs-review
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            
            // Remove needs-triage and add needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });